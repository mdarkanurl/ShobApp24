name: Production Deploy

on:
  workflow_run:
    workflows:
      - CI Pipeline
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t thearkan/shobapp24:${{ steps.meta.outputs.TAG }} \
            -t thearkan/shobapp24:latest \
            .

      - name: Push Docker images
        run: |
          docker push thearkan/shobapp24:${{ steps.meta.outputs.TAG }}
          docker push thearkan/shobapp24:latest

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /projects

            # ── Backup current deployed version ────────────────────────────
            if [ -f current.env ]; then
              cp current.env previous.env
            fi

            # ── Write & export new image tag ────────────────────────────────
            echo "IMAGE_TAG=${{ steps.meta.outputs.TAG }}" > current.env
            export $(cat current.env | xargs)

            # ── Pull & start containers ─────────────────────────────────────
            echo "Pulling new image..."
            docker compose pull

            echo "Starting containers..."
            docker compose up -d --remove-orphans

            # ── Wait for container ID to be available ───────────────────────
            sleep 2
            CONTAINER_ID=$(docker compose ps -q backend)

            if [ -z "$CONTAINER_ID" ]; then
              echo "ERROR: Could not find backend container after startup."
              exit 1
            fi

            # ── Health check (poll until healthy/unhealthy/timeout) ─────────
            wait_for_health() {
              local container_id=$1
              local timeout=${2:-120}
              local elapsed=0

              echo "Waiting for healthcheck (timeout: ${timeout}s)..."

              # Guard: check if the image has a HEALTHCHECK defined
              HAS_HEALTH=$(docker inspect \
                --format='{{if .State.Health}}true{{else}}false{{end}}' \
                "$container_id")

              if [ "$HAS_HEALTH" = "false" ]; then
                echo "WARNING: No HEALTHCHECK defined on container. Skipping health validation."
                return 0
              fi

              while [ $elapsed -lt $timeout ]; do
                STATUS=$(docker inspect \
                  --format='{{.State.Health.Status}}' \
                  "$container_id")

                echo "  [${elapsed}s] Health status: $STATUS"

                if [ "$STATUS" = "healthy" ]; then
                  echo "Container is healthy."
                  return 0
                fi

                if [ "$STATUS" = "unhealthy" ]; then
                  echo "Container is unhealthy."
                  return 1
                fi

                sleep 5
                elapsed=$((elapsed + 5))
              done

              echo "ERROR: Health check timed out after ${timeout}s (last status: $STATUS)."
              return 1
            }

            # ── Rollback logic ──────────────────────────────────────────────
            rollback() {
              echo "Rolling back to previous deployment..."

              if [ ! -f previous.env ]; then
                echo "ERROR: No previous deployment found. Cannot roll back."
                exit 1
              fi

              cp previous.env current.env
              export $(cat current.env | xargs)

              docker compose pull
              docker compose up -d --remove-orphans

              sleep 2
              PREV_CONTAINER_ID=$(docker compose ps -q backend)

              if [ -z "$PREV_CONTAINER_ID" ]; then
                echo "ERROR: Rollback failed — backend container did not start."
                exit 1
              fi

              if wait_for_health "$PREV_CONTAINER_ID" 120; then
                echo "Rollback successful. Previous version is healthy."
              else
                echo "CRITICAL: Rollback also failed. Manual intervention required."
              fi

              exit 1
            }

            # ── Run health check; rollback on failure ───────────────────────
            if ! wait_for_health "$CONTAINER_ID" 120; then
              echo "Deployment failed health check."
              rollback
            fi

            # ── Cleanup ─────────────────────────────────────────────────────
            echo "Deployment successful. Cleaning up old images..."
            docker image prune -af

