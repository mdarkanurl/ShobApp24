services:
  backend:
    image: thearkan/shobapp24:${IMAGE_TAG}
    container_name: shobapp24-backend
    restart: unless-stopped
    ports:
      - "3000:3000"

    env_file:
      - .env.production

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
